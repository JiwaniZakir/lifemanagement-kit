name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd data-api && uv sync --dev

      - name: Ruff check
        run: cd data-api && uv run ruff check app/ tests/

      - name: Ruff format check
        run: cd data-api && uv run ruff format --check app/ tests/

  hooks-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript
        run: npm install --no-save typescript @types/node

      - name: TypeScript type-check hooks
        run: npx tsc --noEmit --esModuleInterop --moduleResolution node --target ES2022 hooks/*/handler.ts

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      DATA_API_TOKEN: test-token-for-ci-at-least-32-chars
      ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd data-api && uv sync --dev

      - name: Install pytest-cov
        run: cd data-api && uv add --dev pytest-cov

      - name: Run database migrations
        run: cd data-api && uv run alembic upgrade head

      - name: Run tests with coverage
        run: cd data-api && uv run pytest tests/ -v --junitxml=results.xml --cov=app --cov-report=xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: data-api/results.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: data-api/coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: placeholder
          DATA_API_TOKEN: placeholder
          ENCRYPTION_MASTER_KEY: placeholder
          OPENCLAW_GATEWAY_TOKEN: placeholder
          ANTHROPIC_API_KEY: placeholder

      - name: Validate production compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
        env:
          POSTGRES_PASSWORD: placeholder
          DATA_API_TOKEN: placeholder
          ENCRYPTION_MASTER_KEY: placeholder
          OPENCLAW_GATEWAY_TOKEN: placeholder
          ANTHROPIC_API_KEY: placeholder

      - name: Build Docker image
        run: docker build -f infrastructure/Dockerfile.data-api -t aegis-data-api:test .

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infrastructure/Dockerfile.data-api -t aegis-data-api:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: aegis-data-api:test
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
