name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd data-api && uv sync --dev

      - name: Ruff check
        run: cd data-api && uv run ruff check app/ tests/

      - name: Ruff format check
        run: cd data-api && uv run ruff format --check app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd data-api && uv sync --dev

      - name: Run tests
        run: cd data-api && uv run pytest tests/ -v --junitxml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: data-api/results.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: placeholder
          DATA_API_TOKEN: placeholder
          ENCRYPTION_MASTER_KEY: placeholder
          OPENCLAW_GATEWAY_TOKEN: placeholder
          ANTHROPIC_API_KEY: placeholder

      - name: Build Docker image
        run: docker build -f infrastructure/Dockerfile.data-api -t aegis-data-api:test .

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f infrastructure/Dockerfile.data-api -t aegis-data-api:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: aegis-data-api:test
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
