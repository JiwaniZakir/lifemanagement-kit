# =============================================================================
# Development overrides — exposes service ports on localhost for local dev
# =============================================================================
# Docker Compose auto-loads this file. NOT for production.
# =============================================================================

services:
  postgres:
    networks:
      - data
      - dev
    ports:
      - "127.0.0.1:5432:5432"

  data-api:
    networks:
      - backend
      - data
      - dev
    ports:
      - "127.0.0.1:8000:8000"

  openclaw-gateway:
    networks:
      - frontend
      - backend
      - dev
    ports:
      - "127.0.0.1:18789:18789"

networks:
  dev:
    driver: bridge
